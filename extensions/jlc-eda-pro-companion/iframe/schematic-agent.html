<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>原理图 Agent</title>
  <style>
    :root { color: #18232c; background: #f4f6f7; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; }
    body { margin: 0; min-width: 680px; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #fff; border-bottom: 1px solid #cbd5db; }
    h1 { margin: 0; font-size: 16px; font-weight: 600; }
    main { display: grid; grid-template-columns: minmax(380px, 1fr) 280px; gap: 12px; padding: 14px 16px; }
    .field-label { display: block; margin-bottom: 6px; color: #485863; font-size: 12px; font-weight: 600; }
    textarea { display: block; width: 100%; min-height: 510px; padding: 10px; resize: vertical; border: 1px solid #9caab3; background: #fff; color: #17212b; font: 12px/1.45 Consolas, "Courier New", monospace; }
    textarea:focus { outline: 2px solid #1e78c4; outline-offset: -1px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    button { min-height: 30px; padding: 5px 11px; border: 1px solid #1c69a6; background: #fff; color: #155a91; font: inherit; cursor: pointer; }
    button.primary { background: #1e78c4; color: #fff; }
    button:hover { background: #e7f2fa; }
    button.primary:hover { background: #1667aa; }
    button:disabled { cursor: wait; opacity: 0.65; }
    .result { min-height: 510px; padding: 11px; border: 1px solid #cbd5db; background: #fff; overflow: auto; }
    .state { margin: 0 0 12px; color: #485863; font-size: 12px; line-height: 1.45; white-space: pre-wrap; }
    .state.error { color: #ae231c; }
    .state.success { color: #176c48; }
    .section { margin-top: 14px; }
    .section:first-child { margin-top: 0; }
    h2 { margin: 0 0 6px; font-size: 13px; font-weight: 600; }
    ul { margin: 0; padding-left: 18px; color: #485863; font-size: 12px; line-height: 1.5; }
    .metric { display: grid; grid-template-columns: 1fr auto; gap: 6px; padding: 5px 0; border-bottom: 1px solid #e7ecef; color: #485863; font-size: 12px; }
    .metric strong { color: #17212b; font-weight: 600; }
    footer { display: flex; justify-content: flex-end; padding: 0 16px 14px; }
  </style>
</head>
<body>
  <header><h1>原理图 Agent</h1><div class="actions"><button type="button" id="template">载入模板</button><button type="button" id="validate">验证</button><button type="button" class="primary" id="apply">生成原理图</button></div></header>
  <main>
    <section><label class="field-label" for="plan">设计计划 JSON</label><textarea id="plan" spellcheck="false"></textarea></section>
    <aside class="result">
      <div class="section"><h2>状态</h2><p class="state" id="status">就绪</p></div>
      <div class="section"><h2>计划</h2><div id="summary"></div></div>
      <div class="section"><h2>问题</h2><ul id="errors"><li>无</li></ul></div>
      <div class="section"><h2>提示</h2><ul id="warnings"><li>无</li></ul></div>
    </aside>
  </main>
  <footer><button type="button" id="close">关闭</button></footer>
  <script>
    (function () {
      'use strict';
      var prefix = 'jlc-eda-design-companion.';
      var template = {
        version: 1,
        components: [],
        wires: [],
        net_flags: [],
        net_ports: [],
        run_erc: true,
        save: true
      };
      var planElement = document.getElementById('plan');
      var statusElement = document.getElementById('status');
      var summaryElement = document.getElementById('summary');
      var errorsElement = document.getElementById('errors');
      var warningsElement = document.getElementById('warnings');
      var validateButton = document.getElementById('validate');
      var applyButton = document.getElementById('apply');

      function getEda() {
        try {
          if (window.parent && window.parent.eda) return window.parent.eda;
          if (window.top && window.top.eda) return window.top.eda;
          if (window.eda) return window.eda;
        } catch (_) {}
        return null;
      }

      function publish(topic, payload) {
        var edaObject = getEda();
        if (!edaObject || !edaObject.sys_MessageBus) return;
        var message = JSON.stringify(payload || {});
        if (typeof edaObject.sys_MessageBus.publish === 'function') edaObject.sys_MessageBus.publish(prefix + topic, message);
        else if (typeof edaObject.sys_MessageBus.push === 'function') edaObject.sys_MessageBus.push(prefix + topic, message);
      }

      function subscribe(topic, handler) {
        var edaObject = getEda();
        if (!edaObject || !edaObject.sys_MessageBus || typeof edaObject.sys_MessageBus.subscribe !== 'function') return;
        edaObject.sys_MessageBus.subscribe(prefix + topic, function (message) {
          try { handler(typeof message === 'string' ? JSON.parse(message) : message); }
          catch (_) { setStatus('响应格式无效', 'error'); }
        });
      }

      function setStatus(value, className) {
        statusElement.textContent = value;
        statusElement.className = 'state' + (className ? ' ' + className : '');
      }

      function renderList(element, values) {
        element.textContent = '';
        var items = Array.isArray(values) && values.length ? values : ['无'];
        items.forEach(function (value) {
          var item = document.createElement('li');
          item.textContent = String(value);
          element.appendChild(item);
        });
      }

      function renderSummary(summary) {
        summaryElement.textContent = '';
        if (!summary) return;
        [['元件', summary.components], ['导线', summary.wires], ['网络标识', summary.net_flags], ['网络端口', summary.net_ports]].forEach(function (item) {
          var row = document.createElement('div');
          row.className = 'metric';
          var label = document.createElement('span');
          label.textContent = item[0];
          var value = document.createElement('strong');
          value.textContent = String(item[1] == null ? 0 : item[1]);
          row.appendChild(label);
          row.appendChild(value);
          summaryElement.appendChild(row);
        });
      }

      function parsePlan() {
        try { return { value: JSON.parse(planElement.value) }; }
        catch (error) { return { error: error && error.message ? error.message : String(error) }; }
      }

      function setBusy(value) {
        validateButton.disabled = value;
        applyButton.disabled = value;
      }

      function validatePlan() {
        var parsed = parsePlan();
        if (parsed.error) {
          setStatus('JSON 解析失败', 'error');
          renderList(errorsElement, [parsed.error]);
          return;
        }
        setStatus('正在验证');
        publish('schematic-plan-validate', { plan: parsed.value });
      }

      function applyPlan() {
        var parsed = parsePlan();
        if (parsed.error) {
          setStatus('JSON 解析失败', 'error');
          renderList(errorsElement, [parsed.error]);
          return;
        }
        setBusy(true);
        setStatus('正在生成原理图');
        publish('schematic-plan-apply', { plan: parsed.value });
      }

      function renderValidation(data) {
        renderSummary(data.summary);
        renderList(errorsElement, data.errors);
        renderList(warningsElement, data.warnings);
        setStatus(data.ok ? '计划已验证' : '计划存在问题', data.ok ? 'success' : 'error');
      }

      function renderResult(data) {
        setBusy(false);
        renderList(errorsElement, data.errors);
        renderList(warningsElement, data.warnings);
        renderSummary(data.created ? {
          components: data.created.components,
          wires: data.created.wires,
          net_flags: data.created.net_flags,
          net_ports: data.created.net_ports
        } : null);
        if (data.ok) {
          var erc = data.erc ? (data.erc.passed ? ' ERC 通过' : ' ERC 待审查') : '';
          setStatus('原理图已生成' + erc, data.erc && !data.erc.passed ? '' : 'success');
        } else {
          setStatus(data.rollback_attempted ? '生成失败，已执行回滚' : '生成失败', 'error');
        }
      }

      document.getElementById('template').addEventListener('click', function () {
        planElement.value = JSON.stringify(template, null, 2);
        setStatus('模板已载入');
      });
      validateButton.addEventListener('click', validatePlan);
      applyButton.addEventListener('click', applyPlan);
      document.getElementById('close').addEventListener('click', function () {
        var edaObject = getEda();
        if (edaObject && edaObject.sys_IFrame && typeof edaObject.sys_IFrame.closeIFrame === 'function') {
          edaObject.sys_IFrame.closeIFrame('jlc-eda-schematic-agent');
        }
      });
      subscribe('schematic-plan-validation', renderValidation);
      subscribe('schematic-plan-result', renderResult);
      planElement.value = JSON.stringify(template, null, 2);
    }());
  </script>
</body>
</html>
