<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>KiCad Routing Tools</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Segoe UI", "Microsoft Sans Serif", Tahoma, sans-serif;
  font-size: 12px; color: #000; background: #f0f0f0;
}
.dialog { display: flex; flex-direction: column; height: 100vh; }
.body-split {
  display: flex; flex-direction: row;
  flex: 1; overflow: hidden;
  padding: 8px; gap: 0;
}
.left-panel {
  width: 300px; min-width: 220px;
  display: flex; flex-direction: column;
  padding-right: 10px;
  border-right: 1px solid #a0a0a0;
  overflow-y: auto;
}
.right-panel {
  flex: 1;
  padding-left: 10px;
  overflow-y: auto;
}
.section-title { font-weight: 700; font-size: 12px; margin-bottom: 4px; margin-top: 8px; }
.left-panel .section-title:first-child,
.right-panel .section-title:first-child { margin-top: 0; }
.section-desc { font-size: 11px; color: #444; margin-bottom: 6px; }
.checkbox-group { display: flex; flex-direction: column; gap: 3px; margin-bottom: 6px; }
.checkbox-group.horizontal { flex-direction: row; flex-wrap: wrap; gap: 4px 16px; }
.checkbox-group label {
  font-size: 12px; cursor: pointer;
  display: flex; align-items: center; gap: 4px;
}
.checkbox-group input[type="checkbox"] { margin: 0; width: 13px; height: 13px; }
.form-row { display: flex; align-items: center; margin-bottom: 4px; }
.form-label { font-size: 12px; min-width: 85px; white-space: nowrap; }
.form-row select, .form-row input[type="text"] {
  flex: 1; padding: 2px 4px;
  border: 1px solid #7a7a7a; background: #fff;
  font-size: 12px; font-family: inherit;
}
.net-list {
  flex: 1; border: 1px solid #7a7a7a; background: #fff;
  overflow-y: auto; min-height: 180px; margin-top: 4px;
}
.net-item {
  padding: 1px 4px; display: flex; align-items: center; gap: 4px;
  font-size: 12px; cursor: default; user-select: none; line-height: 18px;
}
.net-item:hover { background: #e5f3ff; }
.net-item.selected { background: #0078d7; color: #fff; }
.net-item .net-check {
  width: 14px; font-size: 12px; text-align: center;
  color: #0078d7; flex-shrink: 0;
}
.net-item.selected .net-check { color: #fff; }
.net-item .net-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.net-item.connected { color: #888; }
.net-item.connected.selected { color: #fff; }
.net-buttons { display: flex; gap: 8px; margin-top: 4px; }
.net-buttons button {
  flex: 1; padding: 4px 16px; border: 1px solid #7a7a7a;
  background: #e1e1e1; cursor: pointer; font-size: 12px; font-family: inherit;
}
.net-buttons button:hover { background: #d0d0d0; border-color: #555; }
.net-buttons button:active { background: #c0c0c0; }
.param-grid {
  display: grid; grid-template-columns: auto 1fr;
  gap: 4px 8px; align-items: center; margin-bottom: 6px;
}
.param-grid .form-label { font-size: 12px; white-space: nowrap; text-align: left; }
.param-grid input[type="number"], .param-grid input[type="text"] {
  padding: 2px 4px; border: 1px solid #7a7a7a; background: #fff;
  font-size: 12px; font-family: inherit; width: 100%;
}
.param-grid input:focus { outline: none; border-color: #0078d7; }
.param-grid.compact { margin-top: 4px; }
.progress-bar {
  height: 18px; background: #e0e0e0; border: 1px solid #7a7a7a;
  overflow: hidden; margin-bottom: 3px;
}
.progress-fill { height: 100%; background: #06b025; transition: width 0.3s; width: 0%; }
.progress-text { font-size: 11px; color: #333; white-space: pre-wrap; }
.progress-text.error { color: #c00; font-weight: bold; }
.button-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 8px; border-top: 1px solid #a0a0a0; background: #f0f0f0;
  flex-shrink: 0;
}
.button-bar-left, .button-bar-right { display: flex; gap: 6px; }
.button-bar button {
  padding: 4px 20px; border: 1px solid #7a7a7a;
  background: #e1e1e1; font-size: 12px; font-family: inherit;
  cursor: pointer; min-width: 75px;
}
.button-bar button:hover { background: #d0d0d0; border-color: #555; }
.button-bar button:active { background: #c0c0c0; }
.button-bar button:disabled { opacity: 0.5; cursor: not-allowed; }
.status-bar {
  padding: 3px 8px; background: #e8e8e8; border-top: 1px solid #c0c0c0;
  font-size: 11px; color: #333; flex-shrink: 0;
}
</style>
</head>
<body>
<div class="dialog">
  <div class="body-split">
    <div class="left-panel">
      <div class="section-title" id="lbl-net-selection"></div>
      <div class="section-desc" id="lbl-net-selection-desc"></div>
      <div class="checkbox-group">
        <label><input type="checkbox" id="hide-connected" checked> <span id="lbl-hide-connected"></span></label>
        <label><input type="checkbox" id="hide-differential"> <span id="lbl-hide-diff"></span></label>
      </div>
      <div class="form-row">
        <span class="form-label" id="lbl-component"></span>
        <select id="component-select"><option value="" id="opt-none"></option></select>
      </div>
      <div class="form-row">
        <span class="form-label" id="lbl-net-filter"></span>
        <input type="text" id="net-filter">
      </div>
      <div class="form-row">
        <span class="form-label" id="lbl-comp-filter"></span>
        <input type="text" id="comp-filter">
      </div>
      <div class="net-list" id="net-list"></div>
    </div>
    <div class="right-panel">
      <div class="section-title" id="lbl-routing-params"></div>
      <div class="param-grid">
        <span class="form-label" id="lbl-track-width"></span><input type="number" id="track-width" value="0.30" step="0.01" min="0.01">
        <span class="form-label" id="lbl-clearance"></span><input type="number" id="clearance" value="0.25" step="0.01" min="0.01">
        <span class="form-label" id="lbl-via-size"></span><input type="number" id="via-size" value="0.50" step="0.01" min="0.1">
        <span class="form-label" id="lbl-via-drill"></span><input type="number" id="via-drill" value="0.30" step="0.01" min="0.05">
        <span class="form-label" id="lbl-hole-clearance"></span><input type="number" id="hole-clearance" value="0.25" step="0.01" min="0.01">
        <span class="form-label" id="lbl-board-edge-clearance"></span><input type="number" id="board-edge-clearance" value="0.25" step="0.01" min="0">
        <span class="form-label" id="lbl-grid-step"></span><input type="number" id="grid-step" value="0.10" step="0.01" min="0.01">
        <span class="form-label" id="lbl-via-cost"></span><input type="number" id="via-cost" value="50" step="1" min="1">
        <span class="form-label" id="lbl-max-ripup"></span><input type="number" id="max-ripup" value="3" step="1" min="0">
      </div>
      <div class="section-title" id="lbl-copper-layers"></div>
      <div id="layer-checkboxes" class="checkbox-group horizontal"></div>
      <div class="section-title" id="lbl-advanced-options"></div>
      <div class="checkbox-group">
        <label><input type="checkbox" id="stub-layer-swap" checked> <span id="lbl-stub-layer-swap"></span></label>
		<label><input type="checkbox" id="replace-existing"> 覆盖所选网络的已有走线与过孔</label>
      </div>
      <div class="param-grid compact">
        <span class="form-label" id="lbl-power-nets"></span><input type="text" id="power-nets" placeholder="">
        <span class="form-label" id="lbl-power-widths"></span><input type="text" id="power-widths" placeholder="">
        <span class="form-label" id="lbl-layer-costs"></span><input type="text" id="layer-costs" value="1.0 3.0">
      </div>
      <div class="section-title" id="lbl-progress"></div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-text" id="progress-text"></div>
    </div>
  </div>
  <div class="button-bar">
    <div class="button-bar-left">
      <button id="btn-select-all"></button>
      <button id="btn-select-none"></button>
    </div>
    <div class="button-bar-right">
      <button id="btn-route"></button>
      <button id="btn-cancel" disabled></button>
    </div>
  </div>
  <div class="status-bar" id="status-bar"></div>
</div>
<script>
(function() {
  'use strict';
  var edaObj = (typeof eda !== 'undefined') ? eda : (window.parent && window.parent.eda);
  function t(tag, ...args) {
	  if (edaObj && edaObj.sys_I18n) return edaObj.sys_I18n.text(tag, 'k1c4d2r0u7t1n9g3b5r8i0d4g6e2p2v2', undefined, ...args);
	  return tag;
  }
  var eda = window.eda;
  var MSG_PREFIX = 'kirouting-integration.';
  var MM_TO_MIL = 1.0 / 0.0254;
  var allNets = [];
  var allComponents = [];
  var allLayers = [];
  var selectedNets = {};
  var routingInProgress = false;

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function _id(id) { return document.getElementById(id); }
  function _num(id) { var el = _id(id); return el ? parseFloat(el.value) : undefined; }
  function _val(id) { var el = _id(id); return el ? (el.type === 'checkbox' ? el.checked : el.value) : undefined; }

  function applyI18n() {
	  _id('lbl-net-selection').textContent = t('Network Selection');
	  _id('lbl-net-selection-desc').textContent = t('Select nets to route...');
	  _id('lbl-hide-connected').textContent = t('Hide Connected');
	  _id('lbl-hide-diff').textContent = t('Hide Differential Pairs');
	  _id('lbl-component').textContent = t('Component:');
	  _id('opt-none').textContent = t('(none)');
	  _id('lbl-net-filter').textContent = t('Net Filter:');
	  _id('lbl-comp-filter').textContent = t('Component Filter:');
	  _id('lbl-routing-params').textContent = t('Routing Parameters');
	  _id('lbl-track-width').textContent = t('Track Width (mm):');
	  _id('lbl-clearance').textContent = t('Clearance (mm):');
	  _id('lbl-via-size').textContent = t('Via Outer Diameter (mm):');
	  _id('lbl-via-drill').textContent = t('Via Drill (mm):');
	  _id('lbl-hole-clearance').textContent = t('Hole Clearance (mm):');
	  _id('lbl-board-edge-clearance').textContent = t('Board Edge Clearance (mm):');
	  _id('lbl-grid-step').textContent = t('Grid Step (mm):');
	  _id('lbl-via-cost').textContent = t('Via Cost:');
	  _id('lbl-max-ripup').textContent = t('Max Ripup Count:');
	  _id('lbl-copper-layers').textContent = t('Copper Layers');
	  _id('lbl-advanced-options').textContent = t('Advanced Options');
	  _id('lbl-stub-layer-swap').textContent = t('Stub Layer Swap Optimization');
	  _id('lbl-power-nets').textContent = t('Power Nets:');
	  _id('lbl-power-widths').textContent = t('Power Widths:');
	  _id('lbl-layer-costs').textContent = t('Layer Costs:');
	  _id('lbl-progress').textContent = t('Progress');
	  _id('progress-text').textContent = t('Ready');
	  _id('btn-select-all').textContent = t('Select All');
	  _id('btn-select-none').textContent = t('Deselect All');
	  _id('btn-route').textContent = t('Start Routing');
	  _id('btn-cancel').textContent = t('Close');
	  updateStatusBar();
  }

  function sendToExt(topic, data) {
    var fullTopic = MSG_PREFIX + topic;
    if (eda && eda.sys_MessageBus) {
      if (typeof eda.sys_MessageBus.publish === 'function') {
        eda.sys_MessageBus.publish(fullTopic, JSON.stringify(data || {}));
      } else if (typeof eda.sys_MessageBus.push === 'function') {
        eda.sys_MessageBus.push(fullTopic, JSON.stringify(data || {}));
      }
    }
  }

  function onExtMessage(topic, handler) {
    var fullTopic = MSG_PREFIX + topic;
    if (eda && eda.sys_MessageBus) {
      eda.sys_MessageBus.subscribe(fullTopic, function(msg) {
        try { handler(typeof msg === 'string' ? JSON.parse(msg) : msg); }
        catch (e) { console.error('MessageBus parse error:', e); }
      });
    }
  }

  function onLoad() {
    applyI18n();
    loadSettings();
    bindEvents();
    subscribeMessages();
    loadData();
  }

  function loadData() {
    sendToExt('get-nets', {});
    sendToExt('get-components', {});
    sendToExt('get-layers', {});
    sendToExt('get-drc-limits', {});
  }

  var drcLimits = null;

  function subscribeMessages() {
    onExtMessage('nets-list', function(data) {
      allNets = data.nets || [];
      renderNetList();
      updateStatusBar();
    });
    onExtMessage('components-list', function(data) {
      allComponents = data.components || [];
      renderComponentDropdown();
    });
    onExtMessage('layers-list', function(data) {
      allLayers = data.layers || [];
      renderLayerCheckboxes();
    });
    onExtMessage('drc-limits', function(data) {
      drcLimits = data;
      applyDrcDefaults();
    });
    onExtMessage('routing-progress', function(data) {
      setProgress(data.percent || 0);
      setStatus(data.message || t('Routing...'));
    });
    onExtMessage('routing-complete', function(data) {
      if (data.error) {
        setProgress(0);
        setStatus(data.error, true);
      } else {
        var s = data.stats || {};
        setProgress(100);
        setStatus('Done: ' + (s.nets_routed||0) + ' nets, ' + (s.tracks_added||0) + ' tracks, ' + (s.vias_added||0) + ' vias (' + (s.time_seconds||0).toFixed(1) + 's)');
        selectedNets = {};
        sendToExt('get-nets', {});
      }
      finishRouting();
    });
  }

  function isDiffPairName(name) {
    return /[_+](P|N|POS|NEG|PLUS|MINUS)$/i.test(name) || /[_+](P|N)\d*$/i.test(name);
  }

  function renderNetList() {
    var list = _id('net-list');
    if (!list) return;
    var filter = (_id('net-filter') || {}).value || '';
    filter = filter.toLowerCase();
    var compFilter = (_id('comp-filter') || {}).value || '';
    compFilter = compFilter.toLowerCase();
    var hideConnected = _id('hide-connected');
    hideConnected = hideConnected ? hideConnected.checked : false;
    var hideDiff = _id('hide-differential');
    hideDiff = hideDiff ? hideDiff.checked : false;
    var compSel = (_id('component-select') || {}).value || '';

    var filtered = allNets.filter(function(n) {
      if (filter && n.name.toLowerCase().indexOf(filter) < 0) return false;
      if (hideConnected && n.isConnected) return false;
      if (hideDiff && isDiffPairName(n.name)) return false;
      if (compFilter && !(n.components || []).some(function(c) { return c.toLowerCase().indexOf(compFilter) >= 0; })) return false;
      if (compSel && !(n.components || []).some(function(c) { return c === compSel; })) return false;
      return true;
    });

    list.innerHTML = '';
    filtered.forEach(function(n) {
      var div = document.createElement('div');
      var isSel = !!selectedNets[n.name];
      div.className = 'net-item' + (n.isConnected ? ' connected' : '') + (isSel ? ' selected' : '');
      div.innerHTML = '<span class="net-check">' + (isSel ? '✓' : '') + '</span><span class="net-name">' + esc(n.name) + '</span>';
      (function(name) {
        div.addEventListener('click', function() { toggleNet(name, !selectedNets[name]); });
      })(n.name);
      list.appendChild(div);
    });
    updateStatusBar();
  }

  function toggleNet(name, checked) {
    if (checked) selectedNets[name] = true; else delete selectedNets[name];
    renderNetList();
    saveSettings();
  }

  function renderComponentDropdown() {
    var sel = _id('component-select');
    if (!sel) return;
    var val = sel.value;
    sel.innerHTML = '<option value="">' + esc(t('(none)')) + '</option>';
    allComponents.filter(function(c) { return c.padCount >= 2; })
      .sort(function(a, b) { return b.padCount - a.padCount; })
      .forEach(function(c) {
        var opt = document.createElement('option');
        opt.value = c.designator;
        opt.textContent = c.designator + ' (' + c.padCount + ' pads)';
        sel.appendChild(opt);
      });
    sel.value = val;
  }

  function renderLayerCheckboxes() {
    var container = _id('layer-checkboxes');
    if (!container) return;
    container.innerHTML = '';
    allLayers.forEach(function(l) {
      var label = document.createElement('label');
      label.innerHTML = '<input type="checkbox" checked data-layer-id="' + l.id + '"> ' + esc(l.name);
      container.appendChild(label);
    });
  }

  function updateStatusBar() {
    var bar = _id('status-bar');
    if (!bar) return;
    var total = allNets.length;
    var conn = allNets.filter(function(n) { return n.isConnected; }).length;
    var sel = Object.keys(selectedNets).length;
    bar.textContent = 'Total: ' + total + ' | Connected: ' + conn + ' | Pending: ' + (total - conn) + ' | Selected: ' + sel;
  }

  function bindEvents() {
    var nf = _id('net-filter'); if (nf) nf.addEventListener('input', renderNetList);
    var cf = _id('comp-filter'); if (cf) cf.addEventListener('input', renderNetList);
    var hc = _id('hide-connected'); if (hc) hc.addEventListener('change', renderNetList);
    var hd = _id('hide-differential'); if (hd) hd.addEventListener('change', renderNetList);
    var cs = _id('component-select'); if (cs) cs.addEventListener('change', renderNetList);

    _id('btn-select-all').addEventListener('click', function() {
      document.querySelectorAll('#net-list .net-item').forEach(function(div) {
        var name = div.querySelector('.net-name').textContent;
        selectedNets[name] = true;
      });
      renderNetList(); saveSettings();
    });
    _id('btn-select-none').addEventListener('click', function() {
      selectedNets = {}; renderNetList(); saveSettings();
    });
    _id('btn-route').addEventListener('click', startRouting);
    _id('btn-cancel').addEventListener('click', function() { if (routingInProgress) cancelRouting(); });
  }

  function startRouting() {
    var netsToRoute = Object.keys(selectedNets);
    if (netsToRoute.length === 0) { setStatus(t('Please select nets to route first')); return; }

    // DRC validation in iframe before sending message
    if (drcLimits) {
      var errors = [];
      var tw = _num('track-width') || 0.3;
      var cl = _num('clearance') || 0.25;
      var bec = _num('board-edge-clearance') || 0.25;
      var vs = _num('via-size') || 0.5;
      var vd = _num('via-drill') || 0.3;
      var eps = 0.001;
      if (drcLimits.minTrackWidth > 0 && tw < drcLimits.minTrackWidth - eps) {
        errors.push('Track Width (' + tw.toFixed(3) + 'mm) < DRC minimum (' + drcLimits.minTrackWidth.toFixed(3) + 'mm)');
      }
      if (drcLimits.minViaOuter > 0 && vs < drcLimits.minViaOuter - eps) {
        errors.push('Via Size (' + vs.toFixed(3) + 'mm) < DRC minimum (' + drcLimits.minViaOuter.toFixed(3) + 'mm)');
      }
      if (drcLimits.minViaDrill > 0 && vd < drcLimits.minViaDrill - eps) {
        errors.push('Via Drill (' + vd.toFixed(3) + 'mm) < DRC minimum (' + drcLimits.minViaDrill.toFixed(3) + 'mm)');
      }
      if (drcLimits.minClearance > 0 && cl < drcLimits.minClearance - eps) {
        errors.push('Clearance (' + cl.toFixed(3) + 'mm) < DRC minimum (' + drcLimits.minClearance.toFixed(3) + 'mm)');
      }
      if (drcLimits.minEdgeClearance > 0) {
        var effectiveMin = drcLimits.minEdgeClearance + tw / 2;
        if (bec > 0 && bec < effectiveMin - eps) {
          errors.push('Board Edge Clearance (' + bec.toFixed(3) + 'mm) < effective minimum (' + effectiveMin.toFixed(3) + 'mm)');
        }
      }
      if (errors.length > 0) {
        setStatus('DRC validation failed:\n' + errors.join('\n'), true);
        return;
      }
    }

    var selectedLayers = [];
    document.querySelectorAll('#layer-checkboxes input[type="checkbox"]:checked').forEach(function(cb) {
      selectedLayers.push(parseInt(cb.getAttribute('data-layer-id')));
    });
    var config = {
      nets_to_route: netsToRoute,
      track_width: Math.round((_num('track-width') || 0.3) * MM_TO_MIL * 100) / 100,
      clearance: Math.round((_num('clearance') || 0.25) * MM_TO_MIL * 100) / 100,
      board_edge_clearance: Math.round((_num('board-edge-clearance') || 0.25) * MM_TO_MIL * 100) / 100,
      via_size: Math.round((_num('via-size') || 0.5) * MM_TO_MIL * 100) / 100,
      via_drill: Math.round((_num('via-drill') || 0.3) * MM_TO_MIL * 100) / 100,
      grid_step: Math.round((_num('grid-step') || 0.1) * MM_TO_MIL * 100) / 100,
      via_cost: _num('via-cost') || 50,
      max_ripup: _num('max-ripup') || 3,
      layers_to_use: selectedLayers,
      stub_layer_swap: _val('stub-layer-swap'),
      power_nets: _val('power-nets') || '',
      power_widths: ((_val('power-widths') || '').trim() ? (_val('power-widths')).trim().split(/\s+/).map(function(w) { return (Math.round(parseFloat(w) * MM_TO_MIL * 100) / 100).toString(); }).join(' ') : ''),
      layer_costs: _val('layer-costs') || '',
	  replace_existing: _val('replace-existing') === true,
    };
    routingInProgress = true;
    _id('btn-route').disabled = true;
    _id('btn-cancel').disabled = false;
    setProgress(5);
    setStatus('Routing - ' + netsToRoute.length + ' nets selected');
    saveSettings();
    sendToExt('start-routing', config);
  }

  function cancelRouting() { sendToExt('cancel-routing', {}); setStatus(t('Canceling...')); }
  function finishRouting() { routingInProgress = false; _id('btn-route').disabled = false; _id('btn-cancel').disabled = true; }
  function setProgress(pct) { var f = _id('progress-fill'); if (f) f.style.width = Math.max(0, Math.min(100, pct)) + '%'; }
  function setStatus(text, isError) { var st = _id('progress-text'); if (st) { st.textContent = text; st.className = 'progress-text' + (isError ? ' error' : ''); } }

  function saveSettings() {
    try {
      localStorage.setItem('jlc-eda-design-companion-settings', JSON.stringify({
        selectedNets: Object.keys(selectedNets),
        track_width: _val('track-width'), clearance: _val('clearance'),
        board_edge_clearance: _val('board-edge-clearance'),
        via_size: _val('via-size'), via_drill: _val('via-drill'),
        grid_step: _val('grid-step'), via_cost: _val('via-cost'),
        max_ripup: _val('max-ripup'), power_nets: _val('power-nets'),
		power_widths: _val('power-widths'), layer_costs: _val('layer-costs'),
		replace_existing: _val('replace-existing'),
      }));
    } catch(e) {}
  }

  function loadSettings() {
    try {
      var raw = localStorage.getItem('jlc-eda-design-companion-settings');
      if (!raw) return;
      var s = JSON.parse(raw);
      if (s.selectedNets) s.selectedNets.forEach(function(n) { selectedNets[n] = true; });
      var fields = ['track_width','clearance','board_edge_clearance','via_size','via_drill','grid_step','via_cost','max_ripup','power_nets','power_widths','layer_costs'];
      fields.forEach(function(key) {
        var elId = key.replace(/_/g, '-');
        if (s[key] !== undefined && s[key] !== null) { var el = _id(elId); if (el) el.value = s[key]; }
      });
	  if (s.replace_existing !== undefined) _id('replace-existing').checked = !!s.replace_existing;
    } catch(e) {}
  }

  // On open, clamp each routing parameter up to the board's DRC minimum.
  // Values already meeting DRC are left untouched; only violations are raised.
  function applyDrcDefaults() {
    if (!drcLimits) return;
    function clampToMin(id, minVal) {
      if (!(minVal > 0)) return;            // no DRC rule for this param → leave as-is
      var el = _id(id);
      if (!el) return;
      var cur = parseFloat(el.value);
      var minRounded = Math.ceil(minVal * 1000) / 1000;  // round up to 3dp so value stays >= min
      if (isNaN(cur) || cur < minRounded) el.value = minRounded;
    }
    var twMin = drcLimits.minTrackWidth || 0;
    clampToMin('track-width', twMin);
    clampToMin('clearance', drcLimits.minClearance || 0);
    clampToMin('via-size', drcLimits.minViaOuter || 0);
    clampToMin('via-drill', drcLimits.minViaDrill || 0);
    // Board edge: DRC effective min = minEdgeClearance + half track width; also floor at 0.5mm (router requirement)
    var becMin = (drcLimits.minEdgeClearance || 0) + twMin / 2;
    if (becMin < 0.5) becMin = 0.5;
    clampToMin('board-edge-clearance', becMin);
  }

  if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', onLoad); }
  else { onLoad(); }
})();
